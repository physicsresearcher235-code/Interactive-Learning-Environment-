<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قسم الفيزياء | معمل افتراضي</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');

:root {
    --bg-deep: #071824;
    --bg-mid: #12304a;
    --card: rgba(255, 255, 255, 0.94);
    --ink: #10263b;
    --muted: #5a7086;
    --accent: #f0b35a;
    --accent-strong: #d78921;
    --shadow: 0 24px 60px rgba(3, 17, 31, 0.24);
    --radius-lg: 28px;
    --radius-md: 20px;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    font-family: "Cairo", "Segoe UI", Tahoma, sans-serif;
    color: #ecf2f8;
    background:
        radial-gradient(circle at top right, rgba(240, 179, 90, 0.22), transparent 25%),
        radial-gradient(circle at top left, rgba(92, 173, 255, 0.16), transparent 22%),
        linear-gradient(145deg, var(--bg-deep) 0%, var(--bg-mid) 50%, #264563 100%);
}

a {
    color: inherit;
    text-decoration: none;
}

.page-shell {
    width: min(1180px, calc(100% - 32px));
    margin: 0 auto;
    padding: 24px 0 48px;
}

.site-header {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
    padding: 20px 22px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: var(--radius-lg);
    background: rgba(7, 24, 36, 0.42);
    backdrop-filter: blur(18px);
    box-shadow: var(--shadow);
}

.brand-lockup {
    display: flex;
    align-items: center;
    gap: 16px;
    width: 100%;
    justify-content: space-between;
    align-items: center;
}

.logo-badge {
    width: 290px;
    height: 150px;
    max-width: 100%;
    padding: 14px 18px;
    background: #ffffff;
    border: none;
    border-radius: 10px;
    box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
    object-fit: contain;
}

.brand-copy {
    flex: 1;
    text-align: center;
    min-width: 0;
}

.brand-copy h1 {
    margin: 0;
    font-size: clamp(1.7rem, 2.8vw, 2.7rem);
    font-weight: 800;
}

.top-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

.top-nav a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 46px;
    padding: 0 18px;
    border-radius: 999px;
    font-weight: 700;
    border: 1px solid rgba(255, 255, 255, 0.14);
    background: rgba(255, 255, 255, 0.07);
    transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
}

.top-nav a:hover {
    transform: translateY(-2px);
}

.top-nav a[aria-current="page"] {
    color: #11263b;
    background: var(--accent);
    border-color: transparent;
}

.hero,
.card {
    margin-top: 18px;
    background: var(--card);
    color: var(--ink);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
}

.hero {
    padding: 24px 28px;
}

.eyebrow {
    display: inline-flex;
    align-items: center;
    padding: 6px 12px;
    border-radius: 999px;
    color: var(--accent-strong);
    background: rgba(240, 179, 90, 0.16);
    font-size: 0.92rem;
    font-weight: 700;
}

.hero h2 {
    margin: 14px 0 8px;
    font-size: clamp(1.8rem, 3vw, 2.8rem);
}

.card {
    padding: 26px;
}

.card-title {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    margin-bottom: 18px;
}

.card-title h3 {
    margin: 0;
}

.lab-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 18px;
    max-width: 780px;
    margin: 0 auto;
}

.lab-card {
    position: relative;
    display: grid;
    place-items: center;
    min-height: 220px;
    padding: 24px;
    text-align: center;
    border-radius: 26px;
    overflow: hidden;
    box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.08),
        0 18px 36px rgba(8, 19, 32, 0.14);
    transition: transform 0.22s ease, box-shadow 0.22s ease;
}

.lab-card:hover {
    transform: translateY(-4px);
    box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.08),
        0 24px 42px rgba(8, 19, 32, 0.18);
}

.lab-card::after {
    content: "";
    position: absolute;
    inset: auto -26px -26px auto;
    width: 142px;
    height: 142px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.24), transparent 70%);
}

.lab-card strong {
    position: relative;
    z-index: 1;
}

.lab-card strong {
    font-size: 1.35rem;
}

.lab-card--hooke {
    background:
        radial-gradient(circle at top left, rgba(240, 179, 90, 0.22), transparent 30%),
        linear-gradient(145deg, #f8fbff 0%, #ebf2fb 56%, #dce7f4 100%);
}

.lab-card--refraction {
    background:
        radial-gradient(circle at top right, rgba(115, 220, 255, 0.20), transparent 28%),
        radial-gradient(circle at 18% 18%, rgba(255, 100, 118, 0.10), transparent 18%),
        linear-gradient(145deg, #fbfdff 0%, #edf4fb 56%, #ddeaf4 100%);
}

@media (max-width: 720px) {
    .page-shell {
        width: min(100% - 20px, 1180px);
        padding-top: 18px;
    }

    .site-header,
    .hero,
    .card {
        border-radius: 22px;
    }

    .site-header {
        padding: 18px;
    }

    .brand-lockup {
        flex-direction: column;
        justify-content: center;
        gap: 20px;
    }

    .logo-badge {
        width: 220px;
        height: 118px;
        padding: 10px 12px;
    }

    .card {
        padding: 22px;
    }
}
    </style>
</head>
<body>
    <main class="page-shell">
        <header class="site-header">
            <div class="brand-lockup">
                <img class="logo-badge" src="./faculty-logo.png" alt="شعار الكلية">
                <div class="brand-copy">
                    <h1>معمل افتراضي</h1>
                </div>
                <img class="logo-badge" src="./university-logo.png" alt="شعار الجامعة">
            </div>
            <nav class="top-nav" aria-label="روابط الصفحات">
                <a href="./index.html">الرئيسية</a>
                <a href="./classical.html">الميكانيكا الكلاسيكية</a>
                <a href="./waves.html">أساسيات الموجات</a>
                <a href="./electricity.html">الكهربائية</a>
                <a href="./quantum.html">ميكانيكا الكم</a>
                <a href="./triangular.html">بئر جهد مثلثي</a>
                <a href="./dirac-delta.html">أدوات رياضية في الفيزياء</a>
                <a href="./virtual-lab.html" aria-current="page">معمل افتراضي</a>
            </nav>
        </header>

        <section class="hero">
            <span class="eyebrow">معمل افتراضي</span>
            <h2>بيئة تفاعلية تحاكي تجارب فيزيائية من أرض الواقع.</h2>
        </section>

        <section class="card">
            <div class="card-title">
                <div>
                    <h3>التجارب المتاحة</h3>
                </div>
            </div>

            <div class="lab-grid">
                <a class="lab-card lab-card--hooke" href="./hooke-lab.html">
                    <strong>قانون هوك</strong>
                </a>

                <a class="lab-card lab-card--refraction" href="./refraction-lab.html">
                    <strong>انكسار الضوء</strong>
                </a>
            </div>
        </section>
    </main>
</body>
</html>

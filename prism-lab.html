<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قسم الفيزياء | تشتت الضوء بواسطة المنشور</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');

:root {
    --bg-deep: #071824;
    --bg-mid: #12304a;
    --card: rgba(255, 255, 255, 0.94);
    --ink: #10263b;
    --muted: #5a7086;
    --accent: #f0b35a;
    --accent-strong: #d78921;
    --shadow: 0 24px 60px rgba(3, 17, 31, 0.24);
    --radius-lg: 28px;
    --radius-md: 20px;
    --line: rgba(16, 38, 59, 0.12);
    --lab-dark: #081019;
    --lab-panel: #0d1624;
    --metal-1: #d7dee7;
    --metal-2: #8b99ac;
    --steel-1: #bfc8d2;
    --steel-2: #6f7d92;
}

* {
    box-sizing: border-box;
}

html {
    scroll-behavior: smooth;
}

body {
    margin: 0;
    min-height: 100vh;
    font-family: "Cairo", "Segoe UI", Tahoma, sans-serif;
    color: #ecf2f8;
    background:
        radial-gradient(circle at top right, rgba(240, 179, 90, 0.22), transparent 25%),
        radial-gradient(circle at top left, rgba(92, 173, 255, 0.16), transparent 22%),
        linear-gradient(145deg, var(--bg-deep) 0%, var(--bg-mid) 50%, #264563 100%);
}

a {
    color: inherit;
    text-decoration: none;
}

.page-shell {
    width: min(1180px, calc(100% - 32px));
    margin: 0 auto;
    padding: 24px 0 48px;
}

.site-header {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
    padding: 20px 22px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: var(--radius-lg);
    background: rgba(7, 24, 36, 0.42);
    backdrop-filter: blur(18px);
    box-shadow: var(--shadow);
}

.brand-lockup {
    display: flex;
    align-items: center;
    gap: 16px;
}

.logo-badge {
    width: 76px;
    height: 76px;
    border-radius: 22px;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.14);
    padding: 10px;
    object-fit: contain;
}

.logo-badge--hero {
    width: 290px;
    height: 150px;
    max-width: 100%;
    padding: 14px 18px;
    background: #ffffff;
    border: none;
    border-radius: 10px;
    box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
    flex: 0 0 auto;
    object-fit: contain;
}

.site-header--welcome .brand-lockup {
    width: 100%;
    justify-content: space-between;
    align-items: center;
    gap: 24px;
}

.brand-copy {
    flex: 1;
    text-align: center;
    min-width: 0;
}

.brand-copy h1 {
    margin: 0;
    font-size: clamp(1.6rem, 2.6vw, 2.5rem);
    font-weight: 800;
}

.top-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

.top-nav a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 46px;
    padding: 0 18px;
    border-radius: 999px;
    font-weight: 700;
    border: 1px solid rgba(255, 255, 255, 0.14);
    background: rgba(255, 255, 255, 0.07);
    transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
}

.top-nav a:hover {
    transform: translateY(-2px);
}

.top-nav a[aria-current="page"] {
    color: #11263b;
    background: var(--accent);
    border-color: transparent;
}

.hero {
    margin-top: 18px;
}

.hero-panel,
.card {
    background: var(--card);
    color: var(--ink);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
}

.placeholder-card {
    display: grid;
    justify-items: center;
    gap: 18px;
    min-height: 300px;
    padding: 44px 28px;
    text-align: center;
    background: var(--card);
    color: var(--ink);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
}

.placeholder-card h3,
.placeholder-card p {
    margin: 0;
}

.placeholder-card h3 {
    color: #111827;
    font-size: clamp(2rem, 4vw, 3.4rem);
    line-height: 1.35;
    font-weight: 800;
}

.placeholder-card p {
    max-width: 40rem;
    color: rgba(16, 38, 59, 0.64);
    font-size: 1.08rem;
    line-height: 1.9;
    font-weight: 700;
}

.primary-button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 46px;
    padding: 0 22px;
    border-radius: 999px;
    color: #11263b;
    background: var(--accent);
    font-weight: 800;
    transition: transform 0.2s ease, opacity 0.2s ease;
}

.primary-button:hover {
    transform: translateY(-2px);
}

.prism-interactive-card {
    display: grid;
    gap: 18px;
    padding: 22px;
    background: rgba(7, 17, 29, 0.94);
    color: #ecf7ff;
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
    border: 1px solid rgba(255, 255, 255, 0.08);
}

.prism-visual-header {
    display: flex;
    flex-wrap: wrap;
    align-items: end;
    justify-content: space-between;
    gap: 12px;
}

.prism-visual-header h2,
.prism-visual-header p {
    margin: 0;
}

.prism-visual-header h2 {
    font-size: clamp(1.8rem, 3.4vw, 3rem);
    line-height: 1.22;
}

.prism-visual-header p {
    max-width: 45rem;
    color: rgba(236, 247, 255, 0.74);
    line-height: 1.8;
    font-weight: 600;
}

.prism-visual-stage {
    --ray-rotation: 0deg;
    --ray-shift: 0px;
    --internal-ray-rotation: 0deg;
    --internal-ray-shift: 0px;
    --spectrum-rotation: 0deg;
    --spectrum-core-rotation: 0deg;
    --spectrum-shift-x: 0px;
    --spectrum-shift-y: 0px;
    position: relative;
    min-height: 560px;
    aspect-ratio: 1536 / 826;
    overflow: hidden;
    isolation: isolate;
    border-radius: 14px;
    background: linear-gradient(180deg, #020813 0%, #061326 55%, #15243b 100%);
    box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.10),
        0 28px 60px rgba(0, 0, 0, 0.30);
}

.prism-reference-image {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: saturate(1.08) contrast(1.03);
    z-index: 0;
}

.prism-visual-vignette {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background:
        linear-gradient(90deg, rgba(2, 8, 18, 0.14), transparent 28%, rgba(2, 8, 18, 0.03)),
        linear-gradient(180deg, rgba(0, 0, 0, 0.04), transparent 52%, rgba(2, 8, 18, 0.18));
}

.development-panel {
    position: absolute;
    top: 50%;
    left: 50%;
    z-index: 4;
    display: grid;
    justify-items: center;
    gap: 8px;
    width: min(680px, calc(100% - 40px));
    padding: 22px 26px;
    transform: translate(-50%, -50%);
    border-radius: 18px;
    text-align: center;
    background: rgba(226, 230, 236, 0.86);
    border: 1px solid rgba(255, 255, 255, 0.58);
    box-shadow:
        0 18px 42px rgba(0, 0, 0, 0.26),
        0 0 34px rgba(197, 221, 255, 0.18);
    backdrop-filter: blur(10px) saturate(0.92);
}

.development-panel strong {
    color: #111827;
    font-size: clamp(2rem, 4vw, 3.2rem);
    line-height: 1.2;
    font-weight: 800;
    text-shadow: none;
}

.hero-panel {
    padding: 22px 26px;
    position: relative;
    overflow: hidden;
}

.hero-panel::before {
    content: "";
    position: absolute;
    inset: auto -80px -80px auto;
    width: 220px;
    height: 220px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(240, 179, 90, 0.35), transparent 70%);
}

.eyebrow {
    display: inline-flex;
    align-items: center;
    padding: 6px 12px;
    border-radius: 999px;
    color: var(--accent-strong);
    background: rgba(240, 179, 90, 0.16);
    font-size: 0.92rem;
    font-weight: 700;
}

.hero-panel h2 {
    margin: 12px 0 6px;
    font-size: clamp(1.9rem, 3.6vw, 2.8rem);
    line-height: 1.15;
}

.hero-panel p {
    margin: 0;
    max-width: 48rem;
    color: var(--muted);
    line-height: 1.9;
}

.card[id] {
    scroll-margin-top: 26px;
}

.hero-grid {
    display: grid;
    grid-template-columns: minmax(0, 1.3fr) minmax(280px, 0.92fr);
    gap: 18px;
    align-items: start;
}

.hero-note {
    display: grid;
    gap: 14px;
    padding: 18px 20px;
    border-radius: 24px;
    background: rgba(10, 26, 41, 0.88);
    color: #eff6fb;
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
}

.hero-note strong {
    font-size: 1rem;
}

.hero-note p {
    margin: 0;
    color: rgba(239, 246, 251, 0.8);
    line-height: 1.85;
}

.hero-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

.hero-chip {
    display: inline-flex;
    align-items: center;
    min-height: 38px;
    padding: 0 14px;
    border-radius: 999px;
    background: rgba(255,255,255,0.08);
    color: #f3f8fd;
    font-weight: 700;
    font-size: 0.94rem;
}

.lab-directory {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 16px;
}

.lab-link-card {
    position: relative;
    display: grid;
    gap: 8px;
    min-height: 188px;
    padding: 22px;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
    transition: transform 0.22s ease, box-shadow 0.22s ease;
}

.lab-link-card::after {
    content: "";
    position: absolute;
    inset: auto -34px -34px auto;
    width: 132px;
    height: 132px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.22), transparent 70%);
    opacity: 0.7;
}

.lab-link-card:hover {
    transform: translateY(-4px);
    box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.08),
        0 18px 36px rgba(8, 19, 32, 0.16);
}

.lab-link-card strong,
.lab-link-card span,
.lab-link-card small {
    position: relative;
    z-index: 1;
}

.lab-link-card strong {
    font-size: 1.2rem;
}

.lab-link-card span {
    color: rgba(16, 38, 59, 0.76);
    line-height: 1.8;
}

.lab-link-card small {
    color: rgba(16, 38, 59, 0.62);
    font-weight: 700;
}

.lab-link-card--hooke {
    background:
        radial-gradient(circle at top left, rgba(240, 179, 90, 0.22), transparent 28%),
        linear-gradient(145deg, #f8fbff 0%, #eaf2fb 54%, #dbe6f5 100%);
}

.lab-link-card--refraction {
    color: #eff8ff;
    background:
        radial-gradient(circle at top right, rgba(115, 220, 255, 0.36), transparent 26%),
        radial-gradient(circle at 20% 18%, rgba(255, 102, 122, 0.22), transparent 20%),
        linear-gradient(145deg, #10253a 0%, #163b5a 54%, #1f5779 100%);
}

.lab-link-card--refraction span,
.lab-link-card--refraction small {
    color: rgba(239, 248, 255, 0.82);
}

.content-grid {
    display: grid;
    gap: 22px;
    margin-top: 22px;
}

.card {
    padding: 26px;
}

.card-title {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    margin-bottom: 18px;
}

.card-title h3,
.card-title p {
    margin: 0;
}

.card-title p {
    color: var(--muted);
}

.badge {
    display: inline-flex;
    align-items: center;
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--accent-strong);
    background: rgba(240, 179, 90, 0.16);
}

.sim-layout {
    display: grid;
    direction: ltr;
    grid-template-columns: minmax(0, 1.3fr) minmax(300px, 0.88fr);
    gap: 18px;
    align-items: start;
}

.sim-layout > * {
    direction: rtl;
}

.sim-panel {
    display: grid;
    gap: 18px;
}

.lab-stage {
    position: relative;
    min-height: 660px;
    border-radius: 28px;
    overflow: hidden;
    background:
        radial-gradient(circle at top center, rgba(255,255,255,0.05), transparent 35%),
        linear-gradient(180deg, #121e2e 0%, #0a111b 58%, #090f18 100%);
    box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.08),
        inset 0 30px 60px rgba(255,255,255,0.03),
        0 22px 50px rgba(5, 14, 24, 0.28);
}

.lab-stage::after {
    content: "";
    position: absolute;
    inset: auto 0 0;
    height: 110px;
    background:
        linear-gradient(180deg, rgba(255,255,255,0), rgba(255,255,255,0.03)),
        linear-gradient(180deg, #172535, #0d1825);
    border-top: 1px solid rgba(255,255,255,0.06);
}

.lab-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
}

.prism-stage {
    min-height: 620px;
    background:
        radial-gradient(circle at 18% 22%, rgba(255,255,255,0.06), transparent 18%),
        radial-gradient(circle at 78% 26%, rgba(123, 213, 255, 0.10), transparent 28%),
        radial-gradient(circle at 86% 58%, rgba(255, 89, 89, 0.12), transparent 24%),
        linear-gradient(180deg, #111927 0%, #0a1018 48%, #070b11 100%);
}

.prism-stage::after {
    display: none;
}

.lab-ruler {
    position: absolute;
    top: 82px;
    left: 26px;
    width: 34px;
    height: 430px;
    border-radius: 16px;
    background:
        linear-gradient(180deg, rgba(255,255,255,0.22), rgba(255,255,255,0.06)),
        linear-gradient(180deg, #c4b389, #9e8b61);
    box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.15),
        0 10px 20px rgba(0,0,0,0.18);
}

.lab-ruler::before {
    content: "";
    position: absolute;
    inset: 14px 10px;
    background:
        repeating-linear-gradient(
            to bottom,
            transparent 0,
            transparent 9px,
            rgba(48, 36, 15, 0.72) 9px,
            rgba(48, 36, 15, 0.72) 11px
        ),
        repeating-linear-gradient(
            to bottom,
            transparent 0,
            transparent 49px,
            rgba(48, 36, 15, 0.95) 49px,
            rgba(48, 36, 15, 0.95) 52px
        );
    border-radius: 8px;
}

.hanger-zone {
    position: absolute;
    top: 138px;
    left: 50%;
    width: 190px;
    height: 360px;
    transform: translateX(-50%);
    border-radius: 32px;
    border: 2px dashed rgba(240, 179, 90, 0.18);
    background: rgba(240, 179, 90, 0.03);
    transition: border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
}

.hanger-zone.active {
    border-color: rgba(240, 179, 90, 0.52);
    background: rgba(240, 179, 90, 0.09);
    box-shadow: 0 0 0 6px rgba(240, 179, 90, 0.06);
}

.mass-stack {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 130px;
}

.hanging-mass {
    position: absolute;
    left: 50%;
    width: 98px;
    height: 54px;
    transform: translateX(-50%);
    border-radius: 18px 18px 14px 14px;
    background:
        linear-gradient(180deg, rgba(255,255,255,0.68), rgba(255,255,255,0.16)),
        linear-gradient(180deg, var(--metal-1), var(--metal-2));
    box-shadow:
        inset 0 2px 6px rgba(255,255,255,0.35),
        inset 0 -8px 16px rgba(0,0,0,0.18),
        0 12px 20px rgba(0,0,0,0.28);
    display: grid;
    place-items: center;
    font-weight: 800;
    color: #1f3145;
    letter-spacing: 0.2px;
    pointer-events: auto;
    cursor: pointer;
    user-select: none;
}

.hanging-mass::before {
    content: "";
    position: absolute;
    top: -12px;
    left: 50%;
    width: 24px;
    height: 18px;
    transform: translateX(-50%);
    border-radius: 16px 16px 8px 8px;
    background:
        linear-gradient(180deg, rgba(255,255,255,0.68), rgba(255,255,255,0.12)),
        linear-gradient(180deg, #dce5ef, #8a97aa);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.32);
}

.mass-tray {
    position: absolute;
    right: 22px;
    left: 22px;
    bottom: 18px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(88px, 1fr));
    gap: 12px;
    z-index: 3;
}

.mass-chip {
    position: relative;
    min-height: 72px;
    border: 0;
    border-radius: 20px;
    background:
        linear-gradient(180deg, rgba(255,255,255,0.66), rgba(255,255,255,0.10)),
        linear-gradient(180deg, #d8dde6, #7d8798);
    color: #13283b;
    font: inherit;
    font-weight: 800;
    cursor: grab;
    box-shadow:
        inset 0 2px 6px rgba(255,255,255,0.30),
        inset 0 -10px 20px rgba(0,0,0,0.16),
        0 10px 18px rgba(0,0,0,0.20);
    transition: transform 0.18s ease, box-shadow 0.18s ease;
    display: grid;
    place-items: center;
}

.mass-chip::before {
    content: "";
    position: absolute;
    top: 10px;
    left: 50%;
    width: 24px;
    height: 12px;
    transform: translateX(-50%);
    border-radius: 999px;
    background: linear-gradient(180deg, rgba(255,255,255,0.7), rgba(255,255,255,0.18));
}

.mass-chip:hover,
.mass-chip:active {
    transform: translateY(-3px);
    box-shadow:
        inset 0 2px 6px rgba(255,255,255,0.30),
        inset 0 -10px 20px rgba(0,0,0,0.16),
        0 14px 22px rgba(0,0,0,0.24);
}

.mass-chip span,
.hanging-mass span {
    display: block;
    margin-top: 8px;
    font-size: 1rem;
}

.drag-ghost {
    position: absolute;
    width: 98px;
    height: 66px;
    border-radius: 20px;
    background:
        linear-gradient(180deg, rgba(255,255,255,0.66), rgba(255,255,255,0.10)),
        linear-gradient(180deg, #d8dde6, #7d8798);
    box-shadow:
        inset 0 2px 6px rgba(255,255,255,0.30),
        inset 0 -10px 20px rgba(0,0,0,0.16),
        0 20px 28px rgba(0,0,0,0.30);
    color: #13283b;
    font-weight: 800;
    display: grid;
    place-items: center;
    pointer-events: none;
    z-index: 7;
}

.control-grid {
    display: grid;
    gap: 16px;
}

.control-group,
.result-card,
.mass-list {
    padding: 18px;
    border-radius: var(--radius-md);
    background: rgba(16, 38, 59, 0.05);
}

.control-group label,
.result-card strong,
.mass-list h4 {
    display: block;
    margin: 0 0 8px;
    font-weight: 800;
}

.control-group input[type="range"] {
    width: 100%;
    accent-color: var(--accent-strong);
}

.control-group select {
    width: 100%;
    min-height: 48px;
    border: none;
    border-radius: 16px;
    padding: 0 14px;
    background: rgba(255,255,255,0.86);
    color: var(--ink);
    font: inherit;
    font-weight: 700;
    box-shadow: inset 0 0 0 1px rgba(16, 38, 59, 0.08);
}

.value-display {
    display: inline-flex;
    align-items: center;
    padding: 6px 12px;
    border-radius: 999px;
    background: rgba(16, 38, 59, 0.08);
    color: var(--ink);
    font-weight: 700;
    font-family: "Cascadia Mono", "Consolas", monospace;
    margin-top: 8px;
}

.result-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
}

.result-card span {
    color: var(--muted);
    font-weight: 700;
}

.metric-value {
    color: var(--ink);
    font-family: "Cascadia Mono", "Consolas", monospace;
}

.button-row {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
}

.sim-button {
    min-height: 46px;
    border: none;
    border-radius: 999px;
    padding: 0 22px;
    background: var(--accent);
    color: #11263b;
    font: inherit;
    font-weight: 800;
    cursor: pointer;
    transition: transform 0.2s ease, opacity 0.2s ease;
}

.sim-button:hover {
    transform: translateY(-2px);
}

.sim-button--secondary {
    background: rgba(16, 38, 59, 0.10);
    color: var(--ink);
}

.sim-button:disabled {
    opacity: 0.58;
    cursor: not-allowed;
    transform: none;
}

.mass-list {
    display: grid;
    gap: 10px;
}

.mass-list h4 {
    margin-bottom: 2px;
}

.mass-list ul {
    list-style: none;
    padding: 0;
    margin: 0;
    display: grid;
    gap: 10px;
}

.mass-list li {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 14px;
    background: rgba(255,255,255,0.55);

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قسم الفيزياء | تشتت الضوء بواسطة المنشور</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');

:root {
    --bg-deep: #071824;
    --bg-mid: #12304a;
    --accent: #f0b35a;
    --ink: #10263b;
    --shadow: 0 24px 60px rgba(3, 17, 31, 0.24);
    --radius-lg: 28px;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    font-family: "Cairo", "Segoe UI", Tahoma, sans-serif;
    color: #ecf2f8;
    background:
        radial-gradient(circle at top right, rgba(240, 179, 90, 0.22), transparent 25%),
        radial-gradient(circle at top left, rgba(92, 173, 255, 0.16), transparent 22%),
        linear-gradient(145deg, var(--bg-deep) 0%, var(--bg-mid) 50%, #264563 100%);
}

a {
    color: inherit;
    text-decoration: none;
}

.page-shell {
    width: min(1180px, calc(100% - 32px));
    margin: 0 auto;
    padding: 24px 0 48px;
}

.site-header {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
    padding: 20px 22px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: var(--radius-lg);
    background: rgba(7, 24, 36, 0.42);
    backdrop-filter: blur(18px);
    box-shadow: var(--shadow);
}

.brand-lockup {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    gap: 24px;
}

.logo-badge {
    width: 290px;
    height: 150px;
    max-width: 100%;
    padding: 14px 18px;
    background: #ffffff;
    border: none;
    border-radius: 10px;
    box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
    object-fit: contain;
}

.brand-copy {
    flex: 1;
    text-align: center;
    min-width: 0;
}

.brand-copy h1 {
    margin: 0;
    font-size: clamp(1.6rem, 2.6vw, 2.5rem);
    font-weight: 800;
}

.top-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

.top-nav a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 46px;
    padding: 0 18px;
    border-radius: 999px;
    font-weight: 700;
    border: 1px solid rgba(255, 255, 255, 0.14);
    background: rgba(255, 255, 255, 0.07);
    transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
}

.top-nav a:hover {
    transform: translateY(-2px);
}

.top-nav a[aria-current="page"] {
    color: #11263b;
    background: var(--accent);
    border-color: transparent;
}

.content-grid {
    display: grid;
    gap: 22px;
    margin-top: 22px;
}

.prism-interactive-card {
    display: grid;
    gap: 18px;
    padding: 22px;
    background: rgba(7, 17, 29, 0.94);
    color: #ecf7ff;
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
    border: 1px solid rgba(255, 255, 255, 0.08);
}

.prism-visual-stage {
    position: relative;
    min-height: 560px;
    aspect-ratio: 1536 / 826;
    overflow: hidden;
    isolation: isolate;
    border-radius: 14px;
    background: linear-gradient(180deg, #020813 0%, #061326 55%, #15243b 100%);
    box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.10),
        0 28px 60px rgba(0, 0, 0, 0.30);
}

.prism-reference-image {
    position: absolute;
    inset: 0;
    z-index: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: saturate(1.08) contrast(1.03);
}

.prism-visual-vignette {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background:
        linear-gradient(90deg, rgba(2, 8, 18, 0.14), transparent 28%, rgba(2, 8, 18, 0.03)),
        linear-gradient(180deg, rgba(0, 0, 0, 0.04), transparent 52%, rgba(2, 8, 18, 0.18));
}

.development-panel {
    position: absolute;
    top: 18px;
    right: 18px;
    z-index: 4;
    display: inline-flex;
    align-items: center;
    min-height: 42px;
    padding: 0 18px;
    border-radius: 999px;
    background: rgba(240, 179, 90, 0.94);
    border: 1px solid rgba(255, 255, 255, 0.52);
    box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
    backdrop-filter: blur(8px) saturate(0.95);
}

.development-panel strong {
    color: #11263b;
    font-size: 1rem;
    font-weight: 800;
    line-height: 1;
}

@media (max-width: 720px) {
    .page-shell {
        width: min(100% - 20px, 1180px);
        padding-top: 18px;
    }

    .site-header,
    .prism-interactive-card {
        border-radius: 22px;
    }

    .site-header {
        padding: 18px;
    }

    .brand-lockup {
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    .logo-badge {
        width: 220px;
        height: 118px;
        padding: 10px 12px;
    }

    .prism-interactive-card {
        padding: 16px;
    }

    .prism-visual-stage {
        min-height: 520px;
        aspect-ratio: 4 / 5;
    }

    .development-panel {
        top: 14px;
        right: 14px;
        min-height: 38px;
        padding: 0 14px;
    }
}
    </style>
</head>
<body>
    <main class="page-shell">
        <header class="site-header site-header--welcome">
            <div class="brand-lockup">
                <img class="logo-badge logo-badge--faculty" src="./faculty-logo.png" alt="شعار الكلية">
                <div class="brand-copy">
                    <h1>تشتت الضوء بواسطة المنشور</h1>
                </div>
                <img class="logo-badge logo-badge--university" src="./university-logo.png" alt="شعار الجامعة">
            </div>
            <nav class="top-nav" aria-label="روابط الصفحات">
                <a href="./index.html">الرئيسية</a>
                <a href="./classical.html">الميكانيكا الكلاسيكية</a>
                <a href="./waves.html">أساسيات الموجات</a>
                <a href="./electricity.html">الكهربية</a>
                <a href="./quantum.html">ميكانيكا الكم</a>
                <a href="./triangular.html">بئر جهد مثلثي</a>
                <a href="./dirac-delta.html">أدوات رياضية في الفيزياء</a>
                <a href="./virtual-lab.html">معمل افتراضي</a>
                <a href="./hooke-lab.html">قانون هوك</a>
                <a href="./refraction-lab.html">انكسار الضوء</a>
                <a href="./prism-lab.html" aria-current="page">تشتت الضوء</a>
            </nav>
        </header>

        <section class="content-grid">
            <article class="prism-interactive-card">
                <div class="prism-visual-stage">
                    <img class="prism-reference-image" src="./prism-dispersion.png" alt="منشور يشتت الضوء الأبيض إلى طيف مرئي">
                    <div class="prism-visual-vignette" aria-hidden="true"></div>
                    <div class="development-panel">
                        <strong>قيد التطوير</strong>
                    </div>
                </div>
            </article>
        </section>
    </main>
</body>
</html>

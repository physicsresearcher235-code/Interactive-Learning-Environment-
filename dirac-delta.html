<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أدوات رياضية في الفيزياء | تقريب بصري لـ Delta Dirac</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');

:root {
    --bg-deep: #071824;
    --bg-mid: #12304a;
    --card: rgba(255, 255, 255, 0.94);
    --ink: #10263b;
    --muted: #5a7086;
    --accent: #f0b35a;
    --accent-strong: #d78921;
    --shadow: 0 24px 60px rgba(3, 17, 31, 0.24);
    --radius-lg: 28px;
    --radius-md: 20px;
    --line: rgba(16, 38, 59, 0.12);
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
    margin: 0;
    min-height: 100vh;
    font-family: "Cairo", "Segoe UI", Tahoma, sans-serif;
    color: #ecf2f8;
    background:
        radial-gradient(circle at top right, rgba(240, 179, 90, 0.22), transparent 25%),
        radial-gradient(circle at top left, rgba(92, 173, 255, 0.16), transparent 22%),
        linear-gradient(145deg, var(--bg-deep) 0%, var(--bg-mid) 50%, #264563 100%);
}

a { color: inherit; text-decoration: none; }
.page-shell { width: min(1180px, calc(100% - 32px)); margin: 0 auto; padding: 24px 0 48px; }

.site-header {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
    padding: 20px 22px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: var(--radius-lg);
    background: rgba(7, 24, 36, 0.42);
    backdrop-filter: blur(18px);
    box-shadow: var(--shadow);
}

.brand-copy h1,
.card h3 { margin: 0; }

.brand-copy h1 {
    font-size: clamp(1.6rem, 2.6vw, 2.5rem);
    font-weight: 800;
}

.top-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

.top-nav a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 46px;
    padding: 0 18px;
    border-radius: 999px;
    font-weight: 700;
    border: 1px solid rgba(255, 255, 255, 0.14);
    background: rgba(255, 255, 255, 0.07);
    transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
}

.top-nav a:hover { transform: translateY(-2px); }
.top-nav a[aria-current="page"] {
    color: #11263b;
    background: var(--accent);
    border-color: transparent;
}

.hero { margin-top: 28px; }
.hero-panel,
.card {
    background: var(--card);
    color: var(--ink);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
}

.hero-panel {
    padding: 34px;
    position: relative;
    overflow: hidden;
}

.hero-panel::before {
    content: "";
    position: absolute;
    inset: auto -80px -80px auto;
    width: 220px;
    height: 220px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(240, 179, 90, 0.35), transparent 70%);
}

.eyebrow {
    display: inline-flex;
    align-items: center;
    padding: 6px 12px;
    border-radius: 999px;
    color: var(--accent-strong);
    background: rgba(240, 179, 90, 0.16);
    font-size: 0.92rem;
    font-weight: 700;
}

.hero-panel h2 {
    margin: 16px 0 0;
    font-size: clamp(2rem, 4vw, 3.2rem);
    line-height: 1.15;
}

.section-heading { margin: 34px 0 16px; }
.section-heading h3 { margin: 0; font-size: clamp(1.4rem, 2vw, 1.9rem); }

.card { padding: 28px; }
.card h3 { font-size: 1.35rem; margin-bottom: 16px; }

.controls-row {
    display: grid;
    grid-template-columns: minmax(240px, 1fr);
    gap: 16px;
    margin-bottom: 18px;
}

.control-group {
    padding: 16px;
    border: 1px solid var(--line);
    border-radius: var(--radius-md);
    background: rgba(16, 38, 59, 0.03);
}

.control-group label {
    display: block;
    margin-bottom: 10px;
    font-weight: 700;
}

.control-group input[type="range"] {
    width: 100%;
    accent-color: var(--accent-strong);
}

.value-display {
    display: inline-flex;
    align-items: center;
    margin-top: 8px;
    padding: 6px 12px;
    border-radius: 999px;
    background: rgba(16, 38, 59, 0.08);
    font-weight: 700;
    font-family: "Cascadia Mono", "Consolas", monospace;
}

.plot-wrap {
    border-radius: 24px;
    overflow: hidden;
    border: 1px solid rgba(16, 38, 59, 0.1);
    background: #f6fbff;
}

canvas {
    width: 100%;
    height: auto;
    display: block;
}

.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-top: 16px;
}

.stat-box {
    padding: 14px;
    border-radius: var(--radius-md);
    background: rgba(16, 38, 59, 0.05);
}

.stat-box strong {
    display: block;
    margin-bottom: 4px;
    font-size: 1rem;
}

.stat-box span {
    color: var(--muted);
    font-family: "Cascadia Mono", "Consolas", monospace;
}

@media (max-width: 860px) {
    .controls-row {
        grid-template-columns: 1fr;
    }
}

@media (max-width: 720px) {
    .page-shell {
        width: min(100% - 20px, 1180px);
        padding-top: 18px;
    }

    .site-header,
    .hero-panel,
    .card {
        border-radius: 22px;
        padding: 22px;
    }

    .top-nav {
        width: 100%;
        justify-content: center;
        gap: 8px;
    }

    .top-nav a {
        flex: 1 1 132px;
        min-height: 42px;
        padding: 0 14px;
        font-size: 0.96rem;
    }
}
    </style>
</head>
<body>
    <main class="page-shell">
        <header class="site-header">
            <div class="brand-copy">
                <h1>أدوات رياضية في الفيزياء</h1>
            </div>
            <nav class="top-nav" aria-label="روابط الصفحات">
                <a href="./index.html">الرئيسية</a>
                <a href="./classical.html">الميكانيكا الكلاسيكية</a>
                <a href="./electricity.html">الكهربائية</a>
                <a href="./quantum.html">ميكانيكا الكم</a>
                <a href="./triangular.html">بئر جهد مثلثي</a>
                <a href="./dirac-delta.html" aria-current="page">أدوات رياضية في الفيزياء</a>
            </nav>
        </header>

        <section class="hero">
            <article class="hero-panel">
                <span class="eyebrow">أدوات رياضية في الفيزياء</span>
                <h2>تقريب بصري لـ Delta Dirac</h2>
            </article>
        </section>

        <section>
            <div class="section-heading">
                <h3>تقريب بصري لـ Delta Dirac</h3>
            </div>

            <article class="card">
                <div class="controls-row">
                    <div class="control-group">
                        <label for="epsilonRange">ε</label>
                        <input id="epsilonRange" type="range" min="0.20" max="2.00" step="0.01" value="0.60">
                        <div class="value-display" id="epsilonValue">0.60</div>
                    </div>
                </div>

                <div class="plot-wrap">
                    <canvas id="deltaCanvas" width="960" height="420"></canvas>
                </div>

                <div class="stats-grid">
                    <div class="stat-box">
                        <strong>العرض</strong>
                        <span id="widthValue">0.600</span>
                    </div>
                    <div class="stat-box">
                        <strong>الارتفاع</strong>
                        <span id="heightValue">1.667</span>
                    </div>
                    <div class="stat-box">
                        <strong>المساحة</strong>
                        <span id="areaValue">1.000</span>
                    </div>
                </div>
            </article>
        </section>
    </main>

    <script>
        const epsilonRange = document.getElementById("epsilonRange");
        const epsilonValue = document.getElementById("epsilonValue");
        const widthValue = document.getElementById("widthValue");
        const heightValue = document.getElementById("heightValue");
        const areaValue = document.getElementById("areaValue");
        const deltaCanvas = document.getElementById("deltaCanvas");

        function drawAxes(ctx, width, height, margin, minX, maxX, minY, maxY, color = "#b9c9d8") {
            const plotWidth = width - margin.left - margin.right;
            const plotHeight = height - margin.top - margin.bottom;
            const xScale = plotWidth / (maxX - minX);
            const yScale = plotHeight / (maxY - minY);
            const xZero = margin.left + (-minX) * xScale;
            const yZero = height - margin.bottom - (-minY) * yScale;

            ctx.strokeStyle = color;
            ctx.lineWidth = 1.2;
            ctx.beginPath();
            ctx.moveTo(margin.left, yZero);
            ctx.lineTo(width - margin.right, yZero);
            ctx.moveTo(xZero, margin.top);
            ctx.lineTo(xZero, height - margin.bottom);
            ctx.stroke();

            return {
                toCanvasX(x) { return margin.left + (x - minX) * xScale; },
                toCanvasY(y) { return height - margin.bottom - (y - minY) * yScale; }
            };
        }

        function writeLabel(ctx, text, x, y, align = "start", color = "#42627e", size = 15) {
            ctx.fillStyle = color;
            ctx.textAlign = align;
            ctx.font = `600 ${size}px Cairo`;
            ctx.fillText(text, x, y);
        }

        function drawRectangle(ctx, axes, epsilon, baselineY, width, margin) {
            const peak = 1 / epsilon;
            const halfWidth = epsilon / 2;
            const left = axes.toCanvasX(-halfWidth);
            const right = axes.toCanvasX(halfWidth);
            const top = axes.toCanvasY(peak);

            ctx.fillStyle = "rgba(240, 179, 90, 0.28)";
            ctx.fillRect(left, top, right - left, baselineY - top);

            ctx.strokeStyle = "#d78921";
            ctx.lineWidth = 3;
            ctx.strokeRect(left, top, right - left, baselineY - top);

            ctx.strokeStyle = "#42627e";
            ctx.lineWidth = 2;
            const measureY = axes.toCanvasY(-0.18);
            ctx.beginPath();
            ctx.moveTo(left, measureY);
            ctx.lineTo(right, measureY);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(left, measureY - 8);
            ctx.lineTo(left, measureY + 8);
            ctx.moveTo(right, measureY - 8);
            ctx.lineTo(right, measureY + 8);
            ctx.stroke();

            writeLabel(ctx, "ε", (left + right) / 2, measureY - 12, "center", "#10263b");
            writeLabel(ctx, "1 / ε", (left + right) / 2, top - 12, "center", "#10263b");
            widthValue.textContent = epsilon.toFixed(3);
            heightValue.textContent = peak.toFixed(3);
            areaValue.textContent = "1.000";
        }

        function redraw() {
            const ctx = deltaCanvas.getContext("2d");
            const width = deltaCanvas.width;
            const height = deltaCanvas.height;
            const epsilon = parseFloat(epsilonRange.value);
            const rectanglePeak = 1 / epsilon;
            const margin = { top: 28, right: 26, bottom: 56, left: 56 };
            const minX = -4;
            const maxX = 4;
            const minY = -0.35;
            const maxY = Math.max(rectanglePeak * 1.4, 2.1);

            epsilonValue.textContent = epsilon.toFixed(2);
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = "#f6fbff";
            ctx.fillRect(0, 0, width, height);

            const axes = drawAxes(ctx, width, height, margin, minX, maxX, minY, maxY);
            const baselineY = axes.toCanvasY(0);

            writeLabel(ctx, "x", width - margin.right + 2, height - margin.bottom + 8, "start");
            writeLabel(ctx, "δ_ε(x)", margin.left + 4, margin.top - 6, "start");
            drawRectangle(ctx, axes, epsilon, baselineY, width, margin);
        }

        epsilonRange.addEventListener("input", redraw);
        redraw();
    </script>
</body>
</html>
